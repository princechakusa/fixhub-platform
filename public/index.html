<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FixHub – Enterprise Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET & VARIABLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }
    :root {
      --primary: #0f766e;
      --primary-light: #ccfbf1;
      --primary-dark: #0f5c54;
      --primary-bg: #f0fdfa;
      --bg-page: #f8fafc;
      --bg-card: #ffffff;
      --border-light: #e9eef3;
      --border-medium: #dce3e9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --sidebar-width: 260px;
      --sidebar-collapsed: 68px;
      --topbar-height: 64px;
      --border-radius-card: 16px;
      --border-radius-element: 12px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --transition: all 0.2s ease;
    }

    /* ---------- LOGIN SCREEN ---------- */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-page);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .login-card {
      background: var(--bg-card);
      border-radius: var(--border-radius-card);
      width: 400px;
      max-width: 90%;
      padding: 32px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .login-card .logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 24px;
    }
    .login-card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid var(--border-medium);
      border-radius: var(--border-radius-element);
      font-size: 14px;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: var(--border-radius-element);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .error-message {
      background: #fef2f2;
      color: #dc2626;
      border-radius: var(--border-radius-element);
      padding: 10px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    /* ---------- MAIN APP LAYOUT ---------- */
    #app {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      transition: var(--transition);
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      width: var(--sidebar-collapsed);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: var(--topbar-height);
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      transition: var(--transition);
    }
    .icon-btn:hover {
      background: var(--bg-page);
      color: var(--text-primary);
    }
    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }
    .nav-section {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 16px 12px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
      margin-bottom: 2px;
    }
    .nav-item:hover {
      background: var(--bg-page);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: var(--primary-bg);
      color: var(--primary);
    }
    .nav-label {
      flex: 1;
    }
    .nav-badge {
      background: var(--primary);
      color: white;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      min-width: 20px;
      text-align: center;
    }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-light);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      padding: 8px;
      border-radius: 12px;
      background: var(--bg-page);
    }
    .avatar {
      width: 36px;
      height: 36px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
    .user-name {
      font-size: 13px;
      font-weight: 600;
    }
    .user-role {
      font-size: 11px;
      color: var(--text-muted);
    }
    .btn-outline {
      background: none;
      border: 1px solid var(--border-medium);
      padding: 8px 12px;
      border-radius: var(--border-radius-element);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: var(--transition);
    }
    .btn-outline:hover {
      background: var(--bg-page);
      border-color: var(--text-muted);
    }

    /* ---------- MAIN CONTENT ---------- */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      height: var(--topbar-height);
      background: white;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    #mobile-menu-btn {
      display: none;
    }
    #page-title {
      font-size: 18px;
      font-weight: 600;
    }
    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #live-clock {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }
    #content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }

    /* ---------- CARDS, TABLES, FORMS ---------- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--border-radius-card);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .stat-card h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: monospace;
    }
    .table-container {
      background: var(--bg-card);
      border-radius: var(--border-radius-card);
      border: 1px solid var(--border-light);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: var(--bg-page);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-light);
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-secondary);
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill.registered { background: #f1f5f9; color: #64748b; }
    .pill.waiting { background: #f5f3ff; color: #8b5cf6; }
    .pill.inprogress { background: #eff6ff; color: #3b82f6; }
    .pill.inspection { background: #fffbeb; color: #f59e0b; }
    .pill.resolved { background: #ecfdf5; color: #10b981; }
    .priority-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .priority-tag.high { background: #fef2f2; color: #dc2626; }
    .priority-tag.medium { background: #fff7ed; color: #f97316; }
    .priority-tag.low { background: #f0fdf4; color: #22c55e; }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin: 0 4px;
      color: var(--text-muted);
    }
    .action-btn:hover { color: var(--text-primary); }

    /* ---------- MODALS ---------- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: var(--border-radius-card);
      width: 500px;
      max-width: 90%;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    .modal-body input, .modal-body textarea, .modal-body select {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid var(--border-medium);
      border-radius: var(--border-radius-element);
      font-size: 13px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 16px;
    }
    .btn-secondary {
      background: none;
      border: 1px solid var(--border-medium);
      padding: 8px 16px;
      border-radius: var(--border-radius-element);
      cursor: pointer;
    }

    /* ---------- TOAST ---------- */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: #1e293b;
      color: white;
      padding: 12px 16px;
      border-radius: var(--border-radius-element);
      font-size: 13px;
      box-shadow: var(--shadow-md);
      animation: slideIn 0.2s ease;
    }
    .toast.success { background: #10b981; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: -100%;
        z-index: 100;
        transition: left 0.2s ease;
      }
      #sidebar.mobile-open { left: 0; }
      #mobile-menu-btn { display: block; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .topbar { padding: 0 16px; }
      #content-area { padding: 16px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="logo">FixHub</div>
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>
    <div id="login-error" class="error-message"></div>
    <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn" class="btn-primary">Sign In</button>
    <div style="margin-top: 20px; font-size: 12px; color: var(--text-muted);">Contact <strong>Prince Chakusa</strong> for access</div>
  </div>
</div>

<div id="app" style="display: none;">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">FixHub</div>
      <button id="collapse-btn" class="icon-btn">‹</button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <div class="nav-item active" data-view="dashboard"><span class="nav-label">Dashboard</span></div>
      <div class="nav-item" data-view="tickets"><span class="nav-label">Tickets</span><span class="nav-badge" id="ticket-badge">0</span></div>
      <div class="nav-item" data-view="users"><span class="nav-label">Users</span></div>
      <div class="nav-section">Operations</div>
      <div class="nav-item" data-view="inventory"><span class="nav-label">Inventory</span></div>
      <div class="nav-item" data-view="settings"><span class="nav-label">Settings</span></div>
    </nav>
    <div class="sidebar-footer">
      <button id="new-ticket-fab" class="btn-primary" style="margin-bottom: 12px;">+ New Ticket</button>
      <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">Not signed in</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button id="logout-btn" class="btn-outline">Sign Out</button>
    </div>
  </aside>

  <main id="main-content">
    <div class="topbar">
      <button id="mobile-menu-btn" class="icon-btn">☰</button>
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <span id="live-clock"></span>
        <button id="refresh-btn" class="icon-btn">⟳</button>
      </div>
    </div>
    <div id="content-area">
      <div class="view active" id="view-dashboard">Loading dashboard...</div>
      <div class="view" id="view-tickets"></div>
      <div class="view" id="view-users"></div>
      <div class="view" id="view-inventory"></div>
      <div class="view" id="view-settings"></div>
    </div>
  </main>
</div>

<div id="ticket-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modal-title">New Ticket</h3><button class="close-modal">&times;</button></div>
    <div class="modal-body">
      <input type="text" id="ticket-title" placeholder="Title">
      <textarea id="ticket-desc" placeholder="Description"></textarea>
      <select id="ticket-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
      <select id="ticket-status"><option value="registered">Registered</option><option value="waiting">Waiting</option><option value="inprogress">In Progress</option><option value="resolved">Resolved</option></select>
      <input type="date" id="ticket-target">
    </div>
    <div class="modal-footer"><button class="btn-secondary cancel-modal">Cancel</button><button id="save-ticket-btn" class="btn-primary">Save</button></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  // ====================== API CONFIGURATION ======================
  const API_BASE = 'https://fixhub-db.onrender.com/api';
  let authToken = localStorage.getItem('token');
  let currentUser = null;
  let editingTicketId = null;

  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {})
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: 'Request failed' }));
      throw new Error(err.message);
    }
    return res.json();
  }

  function showToast(msg, type = '') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ====================== AUTH ======================
  async function login(email, password) {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    authToken = data.token;
    currentUser = data;
    localStorage.setItem('token', authToken);
    return data;
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.reload();
  }

  // ====================== DASHBOARD ======================
  async function loadDashboard() {
    try {
      const tickets = await apiFetch('/tickets');
      const active = tickets.filter(t => t.status !== 'resolved').length;
      const resolved = tickets.filter(t => t.status === 'resolved').length;
      const total = tickets.length;
      const rate = total ? Math.round((resolved / total) * 100) : 0;
      const statsHtml = `
        <div class="stats-grid">
          <div class="stat-card"><h3>Active Tickets</h3><div class="stat-value">${active}</div></div>
          <div class="stat-card"><h3>Resolved</h3><div class="stat-value">${resolved}</div></div>
          <div class="stat-card"><h3>Total Tickets</h3><div class="stat-value">${total}</div></div>
          <div class="stat-card"><h3>Resolution Rate</h3><div class="stat-value">${rate}%</div></div>
        </div>
        <div class="table-container">
          <h3 style="margin: 0 0 12px 16px; padding-top: 12px;">Recent Tickets</h3>
          <table><thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Status</th></tr></thead>
          <tbody>
            ${tickets.slice(0,5).map(t => `
              <tr>
                <td>${t.id}</td>
                <td>${escapeHtml(t.title)}</td>
                <td><span class="priority-tag ${t.priority}">${t.priority}</span></td>
                <td><span class="pill ${t.status}">${t.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
        <button id="new-ticket-dash" class="btn-primary" style="margin-top: 16px;">+ New Ticket</button>
      `;
      document.getElementById('view-dashboard').innerHTML = statsHtml;
      document.getElementById('new-ticket-dash')?.addEventListener('click', () => openTicketModal());
      document.getElementById('ticket-badge').innerText = active;
    } catch (err) {
      showToast('Dashboard error: ' + err.message, 'error');
    }
  }

  // ====================== TICKETS ======================
  async function loadTickets() {
    try {
      const tickets = await apiFetch('/tickets');
      const html = `
        <div class="table-container">
          <table><thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${tickets.map(t => `
              <tr>
                <td>${t.id}</td>
                <td>${escapeHtml(t.title)}</td>
                <td><span class="priority-tag ${t.priority}">${t.priority}</span></td>
                <td><span class="pill ${t.status}">${t.status}</span></td>
                <td>
                  <button class="action-btn edit-ticket" data-id="${t.id}">✏️</button>
                  <button class="action-btn delete-ticket" data-id="${t.id}">🗑️</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
        <button id="new-ticket-list" class="btn-primary" style="margin-top: 16px;">+ New Ticket</button>
      `;
      document.getElementById('view-tickets').innerHTML = html;
      document.getElementById('new-ticket-list')?.addEventListener('click', () => openTicketModal());
      document.querySelectorAll('.edit-ticket').forEach(btn => {
        btn.addEventListener('click', () => openEditTicket(btn.dataset.id));
      });
      document.querySelectorAll('.delete-ticket').forEach(btn => {
        btn.addEventListener('click', () => deleteTicket(btn.dataset.id));
      });
    } catch (err) {
      showToast('Failed to load tickets: ' + err.message, 'error');
    }
  }

  function openTicketModal(ticket = null) {
    editingTicketId = ticket ? ticket.id : null;
    document.getElementById('modal-title').innerText = ticket ? 'Edit Ticket' : 'New Ticket';
    document.getElementById('ticket-title').value = ticket ? ticket.title : '';
    document.getElementById('ticket-desc').value = ticket ? (ticket.description || '') : '';
    document.getElementById('ticket-priority').value = ticket ? ticket.priority : 'medium';
    document.getElementById('ticket-status').value = ticket ? ticket.status : 'registered';
    document.getElementById('ticket-target').value = ticket ? (ticket.target_date || '') : '';
    document.getElementById('ticket-modal').classList.add('open');
  }

  async function saveTicket() {
    const title = document.getElementById('ticket-title').value.trim();
    if (!title) {
      showToast('Title is required', 'error');
      return;
    }
    const payload = {
      title,
      description: document.getElementById('ticket-desc').value,
      priority: document.getElementById('ticket-priority').value,
      status: document.getElementById('ticket-status').value,
      target_date: document.getElementById('ticket-target').value
    };
    try {
      if (editingTicketId) {
        await apiFetch(`/tickets/${editingTicketId}`, { method: 'PUT', body: JSON.stringify(payload) });
        showToast('Ticket updated', 'success');
      } else {
        await apiFetch('/tickets', { method: 'POST', body: JSON.stringify(payload) });
        showToast('Ticket created', 'success');
      }
      document.getElementById('ticket-modal').classList.remove('open');
      refreshCurrentView();
    } catch (err) {
      showToast('Save failed: ' + err.message, 'error');
    }
  }

  async function openEditTicket(id) {
    try {
      const tickets = await apiFetch('/tickets');
      const ticket = tickets.find(t => t.id === id);
      if (ticket) openTicketModal(ticket);
      else showToast('Ticket not found', 'error');
    } catch (err) {
      showToast('Error loading ticket', 'error');
    }
  }

  async function deleteTicket(id) {
    if (!confirm('Delete this ticket?')) return;
    try {
      await apiFetch(`/tickets/${id}`, { method: 'DELETE' });
      showToast('Ticket deleted', 'success');
      refreshCurrentView();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  // ====================== USERS ======================
  async function loadUsers() {
    try {
      const users = await apiFetch('/users');
      const html = `
        <div class="table-container">
          <div style="padding: 16px; text-align: right;">
            <button id="add-user-btn" class="btn-primary" style="width: auto;">Add User</button>
          </div>
          <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Access</th><th>Actions</th></tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>${escapeHtml(u.name)}</td>
                <td>${escapeHtml(u.email)}</td>
                <td>${escapeHtml(u.role)}</td>
                <td>${u.access_level}</td>
                <td>
                  <button class="action-btn edit-user" data-id="${u.id}">✏️</button>
                  <button class="action-btn delete-user" data-id="${u.id}">🗑️</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      `;
      document.getElementById('view-users').innerHTML = html;
      document.getElementById('add-user-btn')?.addEventListener('click', () => openUserModal());
      document.querySelectorAll('.edit-user').forEach(btn => {
        btn.addEventListener('click', () => openUserModal(btn.dataset.id));
      });
      document.querySelectorAll('.delete-user').forEach(btn => {
        btn.addEventListener('click', () => deleteUser(btn.dataset.id));
      });
    } catch (err) {
      document.getElementById('view-users').innerHTML = '<div class="table-container"><p style="padding:40px;text-align:center">User management – backend endpoints needed</p></div>';
    }
  }

  function openUserModal(userId = null) {
    // Simplified: prompt for user details (for demonstration)
    const name = prompt('Full name');
    if (!name) return;
    const email = prompt('Email');
    if (!email) return;
    const role = prompt('Role (e.g., Technician)') || 'Technician';
    const access = prompt('Access level (technician/supervisor/manager)') || 'technician';
    const password = prompt('Password');
    if (!password) return;
    const payload = { name, email, role, access_level: access, password };
    if (userId) {
      apiFetch(`/users/${userId}`, { method: 'PUT', body: JSON.stringify(payload) })
        .then(() => { showToast('User updated', 'success'); loadUsers(); })
        .catch(err => showToast(err.message, 'error'));
    } else {
      apiFetch('/users', { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { showToast('User created', 'success'); loadUsers(); })
        .catch(err => showToast(err.message, 'error'));
    }
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    try {
      await apiFetch(`/users/${id}`, { method: 'DELETE' });
      showToast('User deleted', 'success');
      loadUsers();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  // ====================== INVENTORY ======================
  async function loadInventory() {
    try {
      const items = await apiFetch('/inventory');
      const html = `
        <div style="margin-bottom: 16px; text-align: right;">
          <button id="add-inv-btn" class="btn-primary" style="width: auto;">Add Item</button>
        </div>
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px,1fr));">
          ${items.map(i => `
            <div class="stat-card">
              <h3>${escapeHtml(i.name)}</h3>
              <div class="stat-value">${i.qty} ${i.unit}</div>
              <div style="margin-top: 8px;">Min: ${i.min_qty}</div>
              <button class="btn-secondary" style="margin-top: 8px;" onclick="editInventory('${i.id}')">Edit</button>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('view-inventory').innerHTML = html;
      document.getElementById('add-inv-btn')?.addEventListener('click', async () => {
        const name = prompt('Item name');
        if (!name) return;
        const qty = parseInt(prompt('Quantity')) || 0;
        const min = parseInt(prompt('Minimum level')) || 5;
        const unit = prompt('Unit') || 'pcs';
        await apiFetch('/inventory', { method: 'POST', body: JSON.stringify({ name, qty, min_qty: min, unit }) });
        loadInventory();
      });
    } catch (err) {
      document.getElementById('view-inventory').innerHTML = '<div class="table-container"><p style="padding:40px;text-align:center">Inventory module – backend endpoints needed</p></div>';
    }
  }

  window.editInventory = async (id) => {
    const newQty = prompt('New quantity');
    if (newQty !== null) {
      await apiFetch(`/inventory/${id}`, { method: 'PUT', body: JSON.stringify({ qty: parseInt(newQty) }) });
      loadInventory();
    }
  };

  // ====================== SETTINGS ======================
  function loadSettings() {
    document.getElementById('view-settings').innerHTML = `
      <div class="table-container"><p style="padding:40px;text-align:center">Settings – will be implemented</p></div>
    `;
  }

  // ====================== NAVIGATION & HELPERS ======================
  function gotoView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    document.getElementById('page-title').innerText = view.charAt(0).toUpperCase() + view.slice(1);
    if (view === 'dashboard') loadDashboard();
    else if (view === 'tickets') loadTickets();
    else if (view === 'users') loadUsers();
    else if (view === 'inventory') loadInventory();
    else if (view === 'settings') loadSettings();
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    document.querySelector(`.nav-item[data-view="${view}"]`).classList.add('active');
  }

  function refreshCurrentView() {
    const active = document.querySelector('.view.active')?.id;
    if (active === 'view-dashboard') loadDashboard();
    else if (active === 'view-tickets') loadTickets();
    else if (active === 'view-users') loadUsers();
    else if (active === 'view-inventory') loadInventory();
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ====================== INITIALIZATION ======================
  async function initApp() {
    const token = localStorage.getItem('token');
    if (token) {
      try {
        const user = await apiFetch('/auth/me');
        currentUser = user;
        authToken = token;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('user-name').innerText = user.name;
        document.getElementById('user-role').innerText = user.role || 'Technician';
        document.getElementById('user-avatar').innerText = user.name.charAt(0);
        gotoView('dashboard');
        // Event listeners
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.getElementById('collapse-btn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
        document.getElementById('mobile-menu-btn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('mobile-open'));
        document.getElementById('refresh-btn').addEventListener('click', refreshCurrentView);
        document.querySelectorAll('.nav-item[data-view]').forEach(item => {
          item.addEventListener('click', () => gotoView(item.dataset.view));
        });
        document.getElementById('new-ticket-fab').addEventListener('click', () => openTicketModal());
        document.getElementById('save-ticket-btn').addEventListener('click', saveTicket);
        document.querySelectorAll('.close-modal, .cancel-modal').forEach(btn => {
          btn.addEventListener('click', () => document.getElementById('ticket-modal').classList.remove('open'));
        });
        // Clock
        function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }
        updateClock(); setInterval(updateClock, 1000);
      } catch (e) {
        localStorage.removeItem('token');
        window.location.reload();
      }
    } else {
      document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errDiv = document.getElementById('login-error');
        try {
          await login(email, password);
          errDiv.style.display = 'none';
          initApp();
        } catch (err) {
          errDiv.innerText = err.message;
          errDiv.style.display = 'block';
        }
      });
    }
  }

  initApp();
</script>
</body>
</html>
