<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixHub | Enterprise Maintenance</title>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">FX</div>
          <span class="logo-text">Fix<em>Hub</em></span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle"><i data-feather="chevron-left"></i></button>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a class="nav-item active" data-view="dashboard"><i data-feather="grid"></i><span>Dashboard</span></a>
        <a class="nav-item" data-view="tickets"><i data-feather="clipboard"></i><span>Tickets</span><span class="badge" id="ticketBadge">0</span></a>
        <a class="nav-item" data-view="users"><i data-feather="users"></i><span>Users</span></a>
        <div class="nav-section">Operations</div>
        <a class="nav-item" data-view="properties"><i data-feather="home"></i><span>Properties</span></a>
        <a class="nav-item" data-view="pm"><i data-feather="calendar"></i><span>Preventive Maint.</span></a>
        <a class="nav-item" data-view="vendors"><i data-feather="truck"></i><span>Vendors</span></a>
        <div class="nav-section">Analytics</div>
        <a class="nav-item" data-view="finance"><i data-feather="dollar-sign"></i><span>Finance</span></a>
        <a class="nav-item" data-view="reports"><i data-feather="bar-chart-2"></i><span>Reports</span></a>
        <a class="nav-item" data-view="performance"><i data-feather="award"></i><span>Performance</span></a>
        <a class="nav-item" data-view="sla"><i data-feather="clock"></i><span>SLA Tracker</span></a>
        <div class="nav-section">System</div>
        <a class="nav-item" data-view="inventory"><i data-feather="package"></i><span>Inventory</span></a>
        <a class="nav-item" data-view="settings"><i data-feather="settings"></i><span>Settings</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-new-ticket" id="newTicketBtn"><i data-feather="plus-circle"></i> Log Issue</button>
        <div class="user-profile">
          <div class="avatar" id="userAvatar">PC</div>
          <div class="user-info">
            <div class="user-name" id="userName">Prince Chakusa</div>
            <div class="user-role" id="userRole">Manager</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i data-feather="menu"></i></button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <div class="topbar-right">
          <span class="clock" id="liveClock"></span>
          <span class="db-status" id="dbStatus">● Connected</span>
          <button class="btn-icon" id="refreshBtn"><i data-feather="refresh-cw"></i></button>
          <button class="btn-primary" id="topNewTicketBtn"><i data-feather="plus"></i> New Ticket</button>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="app.js"></script>
  <script>feather.replace();</script>
</body>
</html>
